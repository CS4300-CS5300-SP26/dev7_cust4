<!-- Adjust warning tag. -->
<style>
    .alert-notif {
        background-color:rgba(2, 125, 150, 0.4) !important;
        backdrop-filter: blur(10px) !important;
        border: none !important;
        color: white !important;
        font-size: 1rem !important;
    }
    .alert-heading {
        font-size: 1rem !important;
        font-weight: 700 !important;
    }
</style>

<!-- Display any errors with form if needed. -->
{% if messages %}
    <div class="flex rounded-md p-2 alert-notif" 
        x-show="showAlert" 
        x-data="{ showAlert: true }"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 scale-90"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-300"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-90"
        x-cloak>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="mr-3 h-5 w-5 flex-shrink-0">
            <path fill-rule="evenodd" d="M19 10.5a8.5 8.5 0 11-17 0 8.5 8.5 0 0117 0zM8.25 9.75A.75.75 0 019 9h.253a1.75 1.75 0 011.709 2.13l-.46 2.066a.25.25 0 00.245.304H11a.75.75 0 010 1.5h-.253a1.75 1.75 0 01-1.709-2.13l.46-2.066a.25.25 0 00-.245-.304H9a.75.75 0 01-.75-.75zM10 7a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
        </svg>
        <div>
            <h4 class="font-bold alert-heading">Info alert</h4>
            <div class="mt-1">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        </div>
        <button class="ml-auto transition transform inline-flex items-center justify-center hover:scale-110 hover:active:scale-90" x-on:click="showAlert = false">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-7 w-7">
            <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
            </svg>
        </button>
    </div>
{% endif %}
