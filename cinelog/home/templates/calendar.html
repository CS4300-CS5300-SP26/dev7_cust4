{% extends "base.html" %}
{% load static %}

{% block content %}
<div id="calendar"></div>

<!-- Modal for editing -->
<div id="event-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:24px; border-radius:8px; z-index:1000; min-width:300px;">
    <h3 id="modal-title"></h3>
    <form method="POST" action="{% url 'edit_movie' %}">
        {% csrf_token %}
        <input type="hidden" name="movie_id" id="modal-movie-id">
        <label>Watch Date</label>
        <input type="date" name="watched_date" id="modal-date"><br><br>
        <label>Rating</label>
        <input type="number" name="rating" id="modal-rating" min="1" max="5"><br><br>
        <label>Notes</label>
        <textarea name="notes" id="modal-notes"></textarea><br><br>
        <button type="submit">Save</button>
    </form>
    <form method="POST" id="delete-form" data-url-base="/library/remove/">
        {% csrf_token %}
        <button type="submit" onclick="return confirm('Remove this movie?')">Delete</button>
    </form>
    <button onclick="document.getElementById('event-modal').style.display='none'">Close</button>
</div>
<div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;" onclick="document.getElementById('event-modal').style.display='none'; this.style.display='none'"></div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        events: '{% url "calendar_events" %}',
        eventClick: function(info) {
            var props = info.event.extendedProps;
            
            document.getElementById('modal-title').textContent = info.event.title;
            document.getElementById('modal-movie-id').value = info.event.id;
            document.getElementById('modal-date').value = info.event.startStr.split('T')[0];
            document.getElementById('modal-rating').value = props.rating;
            document.getElementById('modal-notes').value = props.notes;
            
            // Update delete form action with correct movie id
            const base = document.getElementById('delete-form').dataset.urlBase;
            document.getElementById('delete-form').action = base + info.event.id + '/';
            
            document.getElementById('event-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        }
    });
    calendar.render();
});
</script>
{% endblock %}
