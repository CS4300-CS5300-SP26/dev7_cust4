{% extends "base.html" %}
{% load static %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-white">My Watch Calendar</h1>
        <a href="{% url 'library' %}" class="btn btn-outline-info">← Back to Library</a>
    </div>
    <div id="calendar" class="bg-dark rounded p-3"></div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary">

            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modal-title"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form method="POST" action="{% url 'edit_movie' %}">
                {% csrf_token %}
                <input type="hidden" name="movie_id" id="modal-movie-id">

                <div class="modal-body d-flex flex-column gap-3">
                    <div>
                        <label class="form-label text-muted small">Watch Date</label>
                        <input type="date" name="watched_date" id="modal-date"
                               class="form-control bg-black text-white border-secondary">
                    </div>
                    <div>
                        <label class="form-label text-muted small">Rating</label>
                        <div class="d-flex gap-2">
                            {% for i in "12345" %}
                            <input type="radio" class="btn-check" name="rating" id="modal-star{{ i }}" value="{{ i }}">
                            <label class="btn btn-outline-warning btn-sm" for="modal-star{{ i }}">{{ i }}★</label>
                            {% endfor %}
                        </div>
                    </div>
                    <div>
                        <label class="form-label text-muted small">Notes</label>
                        <textarea name="notes" id="modal-notes"
                                  class="form-control bg-black text-white border-secondary"
                                  rows="3"></textarea>
                    </div>
                </div>

                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-info">Save Changes</button>
                </div>
            </form>

            <div class="modal-footer border-secondary border-top-0 pt-0">
                <form method="POST" id="delete-form" data-url-base="/library/remove/">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('Remove this movie from your library?')">
                        Remove from Library
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var modal = new bootstrap.Modal(document.getElementById('eventModal'));

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        themeSystem: 'bootstrap5',
        events: '{% url "calendar_events" %}',
        eventClick: function(info) {
            var props = info.event.extendedProps;

            document.getElementById('modal-title').textContent = info.event.title;
            document.getElementById('modal-movie-id').value = info.event.id;
            document.getElementById('modal-date').value = info.event.startStr.split('T')[0];
            document.getElementById('modal-notes').value = props.notes;

            // Set rating radio button
            var ratingInput = document.getElementById('modal-star' + props.rating);
            if (ratingInput) ratingInput.checked = true;

            // Update delete form action
            const base = document.getElementById('delete-form').dataset.urlBase;
            document.getElementById('delete-form').action = base + info.event.id + '/';

            modal.show();
        }
    });
    calendar.render();
});
</script>

{% endblock %}
