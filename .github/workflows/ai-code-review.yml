#commenting to slightly change the branches
name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_code_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai PyGithub

      - name: Get PR Diff
        run: |
          git fetch
          git diff origin/${{ github.event.pull_request.base.ref }} > diff.txt

      - name: Run AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python .github/ai-code-review.py

      - name: Upload Review Artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-artifacts
          path: |
            feedback.md

      - name: Comment Feedback on Pull Request
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          file-path: feedback.md

      - name: Cleanup
        run: rm diff.txt feedback.md
